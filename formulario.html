<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Formulário de Filmes</title>
  <link rel="icon" href="cinema.png" type="image/x-icon">
</head>

<body bgcolor="black" text="red">
<div align="center">
<nav>
  <a href="filmes.html"><h3>⬅️Voltar</h3></a>
</nav>

<hr>

<h1>|Indicação de Filmes|</h1>
<h2>||deixe sua indicação aqui||</h2>
<form>
  <fieldset>


    <p>
      <label>Nome:</label><br>
      <input type="text" name="nome" placeholder="digite o seu nome aqui" required>
    </p>

    <p>
      <label>E-mail:</label><br>
      <input type="email" name="email" placeholder="digite seu email aqui" required>
    </p>

    <p>
      <label>data da indicação📅:</label><br>
      <input type="date" name="data" required>
    </p>

  <br>

  
    

    <p>
      <label>Nome do filme:</label><br>
      <input type="text" name="filme" placeholder="digite o nome do filme aqui" required>
    </p>

    <p>
      <label>Gênero:</label><br>
      <select name="genero" required>
        <option>Ação</option>
        <option>Comédia</option>
        <option>Terror</option>
        <option>Drama</option>
        <option>Ficção</option>
      </select>
    </p>

    <p>
      <label>Nota⭐:</label><br>
      <input type="radio" name="nota" value="1"> 1
      <input type="radio" name="nota" value="2"> 2
      <input type="radio" name="nota" value="3"> 3
      <input type="radio" name="nota" value="4"> 4
      <input type="radio" name="nota" value="5"> 5
    </p>

    <p>
      <label>Comentário🗣️:</label><br>
      <textarea name="comentario" placeholder="digite um comentario sobre o filme aqui" rows="5" cols="40"></textarea>
    </p>



  <br>

  
   
<h3>Já assistiu?</h3>
    <input type="radio" name="assistiu" value="sim"> Sim
    <input type="radio" name="assistiu" value="nao"> Não
    <input type="radio" name="assistiu" value="talvez"> Pretendo assistir
  </fieldset>

  <br>

  <input type="submit" value="Enviar">
  <input type="reset" value="Limpar">

</form>
</div>
</body>
</html>
